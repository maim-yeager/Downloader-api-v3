version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: social-downloader:latest
    container_name: social-downloader-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - API_KEY=${API_KEY:-your_secret_key_change_me}
      - DB_PATH=/data/database.sqlite
      - TEMP_PATH=/data/temp
      - CACHE_PATH=/data/cache
      - COOKIE_PATH=/data/cookies
      - LOG_PATH=/data/logs
      - BACKUP_PATH=/data/backups
      - MAX_FILE_SIZE=1073741824
      - TZ=Asia/Dhaka
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - downloader-network
    depends_on:
      - redis  # optional, if you want Redis for caching

  # Optional Redis for better caching
  redis:
    image: redis:7-alpine
    container_name: social-downloader-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - downloader-network

  # Optional Nginx for reverse proxy
  nginx:
    image: nginx:alpine
    container_name: social-downloader-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - downloader-network

volumes:
  redis-data:

networks:
  downloader-network:
    driver: bridge
