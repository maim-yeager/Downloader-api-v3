app = "social-media-downloader-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3002"
  NODE_ENV = "production"
  CACHE_PATH = "/data/cache"
  COOKIE_PATH = "/data/cookies"
  DB_PATH = "/data/database.sqlite"
  TEMP_PATH = "/data/temp"
  LOG_PATH = "/data/logs"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

[[mounts]]
  source = "social_media_data"
  destination = "/data"
  initial_size = "10gb"

[checks]
  [checks.health]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3002
    timeout = "10s"
    type = "http"
